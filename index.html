<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>元素作图工作台</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --ink: #20262e;
      --muted: #66717f;
      --line: #cfd6de;
      --accent: #176b63;
      --accent-dark: #10544e;
      --blue: #315f92;
      --danger: #a43a32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }
    button, select, input { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 350px minmax(0, 1fr);
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 18px;
      overflow-y: auto;
      max-height: 100vh;
    }
    main { min-width: 0; padding: 18px; }
    h1 { margin: 0; font-size: 21px; }
    h2 {
      margin: 20px 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      color: #4f5b68;
    }
    .muted { color: var(--muted); }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin: 16px 0 4px;
      padding: 3px;
      background: #e8ecef;
      border: 1px solid #d9dfe5;
      border-radius: 7px;
    }
    .tab {
      min-height: 36px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: #4b5563;
      cursor: pointer;
      font-weight: 700;
    }
    .tab.active { background: #fff; color: var(--accent-dark); box-shadow: 0 1px 3px #00000018; }
    label { display: block; margin: 10px 0 5px; font-weight: 650; }
    select, input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      min-height: 35px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
      color: var(--ink);
    }
    input[type="checkbox"] { width: 16px; height: 16px; margin: 0; }
    input[type="color"] {
      width: 100%;
      height: 36px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .check-row { display: flex; gap: 8px; align-items: center; margin-top: 9px; }
    .check-row label { margin: 0; font-weight: 500; }
    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button.command {
      min-height: 37px;
      border: 1px solid var(--accent);
      border-radius: 5px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    button.command:hover { background: var(--accent-dark); }
    button.command.secondary { background: var(--blue); border-color: var(--blue); }
    button:disabled, select:disabled, input:disabled { opacity: .5; cursor: not-allowed; }
    .panel[hidden] { display: none; }
    .filter-list {
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 6px;
      background: #fafbfc;
    }
    .filter-item {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      padding: 4px;
    }
    .filter-item span:last-child { color: var(--muted); font-size: 12px; }
    .tree-actions, .element-actions {
      display: flex;
      gap: 6px;
      margin: 6px 0;
    }
    .mini-button {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: #334155;
      cursor: pointer;
      padding: 4px 8px;
    }
    .tree-node { margin: 2px 0; }
    .tree-node summary {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      cursor: pointer;
      list-style: none;
      font-weight: 650;
    }
    .tree-node summary::-webkit-details-marker { display: none; }
    .tree-node summary::before { content: "▸"; width: 12px; color: #6b7280; }
    .tree-node[open] > summary::before { content: "▾"; }
    .tree-children { margin-left: 19px; border-left: 1px solid #d9dee5; padding-left: 7px; }
    .tree-leaf {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      min-height: 27px;
      padding: 2px 3px;
    }
    .tree-count { color: var(--muted); font-size: 12px; }
    .element-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .element-list {
      height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fafbfc;
      padding: 5px;
    }
    .element-choice {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 27px;
    }
    .selected-element {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 26px 26px;
      gap: 3px;
      align-items: center;
      min-height: 29px;
      padding: 2px 3px;
      border-bottom: 1px solid #e5e9ee;
    }
    .move-button {
      width: 26px;
      min-height: 24px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .style-editor {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
    }
    .style-preview {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 34px;
      color: var(--muted);
    }
    .preview-marker {
      width: 17px;
      height: 17px;
      flex: 0 0 17px;
      background: #777;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px #aab2bd;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      background: #edf7f5;
      color: #285e58;
      display: none;
    }
    .status.error { display: block; background: #fff0ef; color: var(--danger); }
    .chart-shell {
      min-height: calc(100vh - 36px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
      display: grid;
      grid-template-rows: minmax(560px, 1fr) auto;
      gap: 8px;
    }
    .chart-title {
      display: none;
    }
    #chart { width: 100%; height: 100%; min-height: 560px; background: #fff; }
    .chart-note { color: var(--muted); min-height: 20px; }
    .axis, .plot-frame { stroke: #000; stroke-width: 1.4; fill: none; }
    .tick { stroke: #000; stroke-width: 1.1; }
    .tick-label { fill: #252b32; font-size: 20px; }
    .axis-label { fill: #252b32; font-size: 32px; font-weight: 700; }
    .legend-text { fill: #252b32; font-size: 12px; }
    #tooltip {
      position: fixed;
      display: none;
      pointer-events: none;
      z-index: 10;
      max-width: 320px;
      padding: 8px 10px;
      border-radius: 5px;
      background: rgba(20, 25, 31, .94);
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { max-height: none; border-right: 0; border-bottom: 1px solid var(--line); }
      .chart-shell { min-height: 720px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>元素作图工作台</h1>
      <div class="muted">数据仅在当前浏览器中处理，不上传到服务器。</div>

      <h2>数据</h2>
      <label for="fileInput">Excel 或 CSV 文件</label>
      <input id="fileInput" type="file" accept=".xlsx,.xls,.xlsm,.csv">
      <label for="sheetSelect">工作表</label>
      <select id="sheetSelect" disabled></select>

      <div class="tabs" role="tablist">
        <button id="scatterTab" class="tab active" type="button">散点图</button>
        <button id="lineTab" class="tab" type="button">元素配分图</button>
      </div>

      <section id="scatterControls" class="panel">
        <h2>坐标</h2>
        <div class="row">
          <div><label for="xSelect">横坐标</label><select id="xSelect" disabled></select></div>
          <div><label for="ySelect">纵坐标</label><select id="ySelect" disabled></select></div>
        </div>
        <div class="row">
          <div><label for="xTitle">横轴标题</label><input id="xTitle" type="text" disabled></div>
          <div><label for="yTitle">纵轴标题</label><input id="yTitle" type="text" disabled></div>
        </div>
        <div class="row">
          <div class="check-row"><input id="logX" type="checkbox" disabled><label for="logX">横轴对数</label></div>
          <div class="check-row"><input id="logY" type="checkbox" disabled><label for="logY">纵轴对数</label></div>
        </div>
      </section>

      <section id="lineControls" class="panel" hidden>
        <h2>元素序列</h2>
        <div class="element-actions">
          <button id="reePreset" class="mini-button" type="button" disabled>稀土元素预设</button>
          <button id="selectAllElements" class="mini-button" type="button" disabled>全选</button>
          <button id="clearElements" class="mini-button" type="button" disabled>清空</button>
        </div>
        <div class="element-picker">
          <div>
            <label>可选数值列</label>
            <div id="availableElements" class="element-list"></div>
          </div>
          <div>
            <label>已选元素及顺序</label>
            <div id="selectedElements" class="element-list"></div>
          </div>
        </div>
        <label for="lineMode">线条模式</label>
        <select id="lineMode" disabled>
          <option value="individual">每个样品一条线</option>
          <option value="mean">每个类别的平均值</option>
        </select>
        <label for="meanField">平均值分组字段</label>
        <select id="meanField" disabled></select>
        <div class="check-row"><input id="lineLogY" type="checkbox" checked disabled><label for="lineLogY">纵轴使用对数坐标</label></div>
        <div class="check-row"><input id="showMarkers" type="checkbox" checked disabled><label for="showMarkers">显示数据点</label></div>
      </section>

      <h2>分类样式</h2>
      <label for="colorMode">颜色规则</label>
      <select id="colorMode" disabled>
        <option value="hierarchy">Mission 色系 + Sub_Type 色阶</option>
        <option value="mission">仅按 Mission</option>
        <option value="ti">仅按 Ti_Type</option>
        <option value="type">按 Type</option>
      </select>
      <label for="shapeMode">点形状规则</label>
      <select id="shapeMode" disabled>
        <option value="ti">按 Ti_Type</option>
        <option value="uniform">全部圆形</option>
      </select>
      <label>层级筛选：Ti_Type → Mission → Sub_Type</label>
      <div class="tree-actions">
        <button id="selectAllTree" class="mini-button" type="button" disabled>全选</button>
        <button id="clearTree" class="mini-button" type="button" disabled>清空</button>
        <button id="expandTree" class="mini-button" type="button" disabled>展开</button>
        <button id="collapseTree" class="mini-button" type="button" disabled>折叠</button>
      </div>
      <div id="filterList" class="filter-list"><div class="muted">请先导入文件</div></div>
      <div class="check-row"><input id="showLegend" type="checkbox" checked disabled><label for="showLegend">显示图例</label></div>
      <div class="style-editor">
        <label for="styleTarget">编辑类别样式</label>
        <select id="styleTarget" disabled></select>
        <div class="row">
          <div><label for="fillColor">填充色</label><input id="fillColor" type="color" value="#3478B8" disabled></div>
          <div><label for="borderColor">边框色</label><input id="borderColor" type="color" value="#FFFFFF" disabled></div>
        </div>
        <label for="markerShape">形状</label>
        <select id="markerShape" disabled>
          <option value="circle">圆形</option>
          <option value="square">方形</option>
          <option value="diamond">菱形</option>
          <option value="triangle">三角形</option>
        </select>
        <div id="stylePreview" class="style-preview"><span id="previewMarker" class="preview-marker"></span><span>当前样式预览</span></div>
        <div class="button-row">
          <button id="applyStyle" class="command" type="button" disabled>应用样式</button>
          <button id="resetStyle" class="command secondary" type="button" disabled>恢复默认</button>
        </div>
      </div>

      <h2>计算列</h2>
      <label for="newName">新列名称</label>
      <input id="newName" type="text" placeholder="例如 Zr_Nb" disabled>
      <div class="row">
        <div><label for="numSelect">分子</label><select id="numSelect" disabled></select></div>
        <div><label for="denSelect">分母</label><select id="denSelect" disabled></select></div>
      </div>
      <button id="addRatio" class="command secondary" type="button" disabled>新增比值列</button>

      <h2>导出图片</h2>
      <div class="button-row">
        <button id="downloadPng" class="command" type="button" disabled>导出 PNG</button>
        <button id="downloadSvg" class="command secondary" type="button" disabled>导出 SVG</button>
      </div>
      <div id="status" class="status"></div>
    </aside>

    <main>
      <div class="chart-shell">
        <div id="chartTitle" class="chart-title">请导入表格</div>
        <svg id="chart" viewBox="0 0 1200 900" role="img" aria-label="数据图表"></svg>
        <div id="chartNote" class="chart-note"></div>
      </div>
    </main>
  </div>
  <div id="tooltip"></div>

  <script>
    const NS = "http://www.w3.org/2000/svg";
    const categoryFields = ["Type", "Mission", "Ti_Type", "Sub_Type"];
    const missionColors = {
      "Apollo 11": "#E87524", "Apollo11": "#E87524",
      "Apollo 17": "#E3B323", "A17": "#E3B323",
      "Apollo 12": "#3478B8", "A12": "#3478B8",
      "Apollo 15": "#3C9B5F", "A15": "#3C9B5F",
      "Apollo 14": "#718A9B", "A14": "#718A9B",
      "Apollo 16": "#A77A59", "A16": "#A77A59",
      "CE-5": "#24A8E0", "CE-6": "#7757B8",
      "Met": "#4B5563"
    };
    const tiColors = {
      "High-Ti": "#E65D32",
      "Low-Ti": "#258F87",
      "Very low-Ti": "#7655B5",
      "Very-Low-Ti": "#7655B5",
      "KREEP": "#D3A322"
    };
    const tiShapes = {
      "High-Ti": "circle",
      "Low-Ti": "square",
      "Very low-Ti": "diamond",
      "Very-Low-Ti": "diamond",
      "KREEP": "triangle"
    };
    const fallbackPalette = ["#4E79A7","#F28E2B","#59A14F","#E15759","#B07AA1","#76B7B2","#EDC948","#9C755F","#BAB0AC"];
    const state = {
      workbook: null, sheetName: "", headers: [], rows: [], mode: "scatter",
      numericHeaders: [], selectedElements: [], selectedLeafKeys: new Set(),
      tree: new Map(), subtypeIndex: new Map(), styleOverrides: new Map()
    };
    const $ = id => document.getElementById(id);
    const svg = $("chart");

    function showStatus(text, error = false) {
      const el = $("status");
      el.textContent = text;
      el.className = "status" + (error ? " error" : "");
      el.style.display = text ? "block" : "none";
    }
    function svgEl(name, attrs = {}, text = "") {
      const el = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
      if (text !== "") el.textContent = text;
      return el;
    }
    function clean(value) { return value == null ? "" : String(value).trim(); }
    function number(value) {
      if (typeof value === "number" && Number.isFinite(value)) return value;
      if (typeof value !== "string") return NaN;
      const n = Number(value.replace(/,/g, "").trim());
      return Number.isFinite(n) ? n : NaN;
    }
    function safeName(name) {
      return (name || "chart").replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, " ").trim();
    }
    function hash(text) {
      let h = 2166136261;
      for (const ch of String(text)) { h ^= ch.charCodeAt(0); h = Math.imul(h, 16777619); }
      return h >>> 0;
    }
    function mix(hex, amount) {
      const raw = hex.replace("#","");
      const rgb = [0,2,4].map(i => parseInt(raw.slice(i,i+2),16));
      const target = amount >= 0 ? 255 : 0;
      const p = Math.abs(amount);
      return "#" + rgb.map(v => Math.round(v + (target-v)*p).toString(16).padStart(2,"0")).join("");
    }
    function baseMission(row) { return clean(row.Mission) || "未分类"; }
    function subtype(row) { return clean(row.Sub_Type) || "未细分"; }
    function tiType(row) { return clean(row.Ti_Type) || "未分类"; }
    function typeName(row) { return clean(row.Type) || "未分类"; }
    function rebuildSubtypeIndex() {
      state.subtypeIndex.clear();
      const grouped = new Map();
      state.rows.forEach(row => {
        const m = baseMission(row);
        if (!grouped.has(m)) grouped.set(m, new Set());
        grouped.get(m).add(subtype(row));
      });
      grouped.forEach((set, mission) => {
        [...set].sort().forEach((sub, i) => state.subtypeIndex.set(mission + "\u0000" + sub, { i, n: set.size }));
      });
    }
    function styleFor(row) {
      const mode = $("colorMode").value;
      const mission = baseMission(row);
      const sub = subtype(row);
      const ti = tiType(row);
      let color;
      if (mode === "hierarchy") {
        const base = missionColors[mission] || fallbackPalette[hash(mission) % fallbackPalette.length];
        const meta = state.subtypeIndex.get(mission + "\u0000" + sub) || { i: 0, n: 1 };
        const steps = [-0.28,-0.14,0,0.15,0.29,0.41];
        color = mix(base, steps[meta.i % steps.length]);
      } else if (mode === "mission") {
        color = missionColors[mission] || fallbackPalette[hash(mission) % fallbackPalette.length];
      } else if (mode === "ti") {
        color = tiColors[ti] || fallbackPalette[hash(ti) % fallbackPalette.length];
      } else {
        color = fallbackPalette[hash(typeName(row)) % fallbackPalette.length];
      }
      const base = {
        color,
        border: "#FFFFFF",
        shape: $("shapeMode").value === "ti" ? (tiShapes[ti] || "circle") : "circle"
      };
      const scopes = [`ti:${ti}`, `mission:${ti}\u0001${mission}`, `leaf:${ti}\u0001${mission}\u0001${sub}`];
      scopes.forEach(key => Object.assign(base, state.styleOverrides.get(key) || {}));
      return base;
    }
    function legendName(row) {
      const mode = $("colorMode").value;
      const shape = $("shapeMode").value;
      const colorLabel = mode === "hierarchy" ? `${baseMission(row)} / ${subtype(row)}`
        : mode === "mission" ? baseMission(row)
        : mode === "ti" ? tiType(row) : typeName(row);
      return shape === "ti" && mode !== "ti" ? `${colorLabel} / ${tiType(row)}` : colorLabel;
    }
    function setEnabled(enabled) {
      document.querySelectorAll("aside select, aside input:not(#fileInput), aside button.command").forEach(el => el.disabled = !enabled);
      document.querySelectorAll("aside .mini-button").forEach(el => el.disabled = !enabled);
      $("sheetSelect").disabled = !state.workbook;
      updateLineModeState();
    }
    function setOptions(select, values, preferred = "") {
      select.replaceChildren();
      values.forEach(value => select.add(new Option(value, value)));
      if (values.includes(preferred)) select.value = preferred;
    }
    function parseSheet(name) {
      const sheet = state.workbook.Sheets[name];
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
      if (!matrix.length) throw new Error("工作表为空。");
      const headers = matrix[0].map((v,i) => clean(v) || `Column_${i+1}`);
      state.headers = headers;
      state.rows = matrix.slice(1).filter(row => row.some(v => v !== null && v !== "")).map(values => {
        const obj = {};
        headers.forEach((h,i) => obj[h] = values[i]);
        return obj;
      });
      state.sheetName = name;
      rebuildSubtypeIndex();
      populateControls();
      render();
      showStatus(`已读取 ${state.rows.length} 行、${state.headers.length} 列。`);
    }
    function populateControls() {
      const numericHeaders = state.headers.filter(h => state.rows.some(r => Number.isFinite(number(r[h]))));
      state.numericHeaders = numericHeaders;
      const xPreferred = numericHeaders.includes("Mg#") ? "Mg#" : numericHeaders[0];
      const yPreferred = numericHeaders.includes("TiO2_wt%") ? "TiO2_wt%" : numericHeaders[1] || numericHeaders[0];
      ["xSelect","ySelect","numSelect","denSelect"].forEach(id => setOptions($(id), numericHeaders));
      $("xSelect").value = xPreferred || "";
      $("ySelect").value = yPreferred || "";
      $("xTitle").value = $("xSelect").value;
      $("yTitle").value = $("ySelect").value;
      state.selectedElements = reeColumns(numericHeaders);
      if (state.selectedElements.length < 2) state.selectedElements = numericHeaders.slice(0, Math.min(8, numericHeaders.length));
      renderElementPicker();
      const presentFields = categoryFields.filter(f => state.headers.includes(f));
      setOptions($("meanField"), presentFields.length ? presentFields : ["Type"]);
      buildClassificationTree();
      setEnabled(true);
    }
    function reeColumns(headers) {
      const symbols = ["La","Ce","Pr","Nd","Sm","Eu","Gd","Tb","Dy","Ho","Er","Tm","Yb","Lu"];
      const found = [];
      symbols.forEach(symbol => {
        const match = headers.find(h => new RegExp(`^${symbol}(?:_N)?$`, "i").test(h));
        if (match) found.push(match);
      });
      return found;
    }
    function renderElementPicker() {
      const available = $("availableElements");
      const selected = $("selectedElements");
      available.replaceChildren();
      selected.replaceChildren();
      state.numericHeaders.forEach(name => {
        const label = document.createElement("label");
        label.className = "element-choice";
        const box = document.createElement("input");
        box.type = "checkbox";
        box.checked = state.selectedElements.includes(name);
        box.addEventListener("change", () => {
          if (box.checked && !state.selectedElements.includes(name)) state.selectedElements.push(name);
          if (!box.checked) state.selectedElements = state.selectedElements.filter(v => v !== name);
          renderElementPicker();
          render();
        });
        label.append(box, document.createTextNode(name));
        available.append(label);
      });

      if(id==="xSelect")$("xTitle").value=$(id).value;else $("yTitle").value=$(id).value;render();
    }));
    ["xTitle","yTitle"].forEach(id=>$(id).addEventListener("input",render));
    ["logX","logY","lineLogY","showMarkers","showLegend"].forEach(id=>$(id).addEventListener("change",render));
    ["meanField","colorMode","shapeMode"].forEach(id=>$(id).addEventListener("change",render));
    setEnabled(false);
    if (new URLSearchParams(location.search).get("demo") === "1") {
      fetch("demo.csv").then(r => r.arrayBuffer()).then(buffer => {
        state.workbook = XLSX.read(buffer, { type: "array" });
        setOptions($("sheetSelect"), state.workbook.SheetNames);
        parseSheet(state.workbook.SheetNames[0]);
      }).catch(err => showStatus(`测试数据读取失败：${err.message || err}`, true));
    }
  </script>
</body>
</html>
