<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>元素作图工作台</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --ink: #20262e;
      --muted: #66717f;
      --line: #cfd6de;
      --accent: #176b63;
      --accent-dark: #10544e;
      --blue: #315f92;
      --danger: #a43a32;
      --sidebar-width: 350px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 Calibri, FangSong, "仿宋", sans-serif;
    }
    button, select, input { font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 18px;
      overflow-y: auto;
      max-height: 100vh;
    }
    main { min-width: 0; padding: 18px; }
    h1 { margin: 0; font-size: 21px; }
    h2 {
      margin: 20px 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      color: #4f5b68;
    }
    .control-section {
      margin-top: 10px;
      border-top: 1px solid #e2e7ec;
      padding-top: 4px;
    }
    .control-section > summary {
      cursor: pointer;
      list-style: none;
      padding: 8px 0;
      color: #4f5b68;
      font-weight: 700;
      text-transform: uppercase;
    }
    .control-section > summary::before { content: "▸"; display: inline-block; width: 16px; }
    .control-section[open] > summary::before { content: "▾"; }
    .control-section > summary::-webkit-details-marker { display: none; }
    .muted { color: var(--muted); }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin: 16px 0 4px;
      padding: 3px;
      background: #e8ecef;
      border: 1px solid #d9dfe5;
      border-radius: 7px;
    }
    .tab {
      min-height: 36px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: #4b5563;
      cursor: pointer;
      font-weight: 700;
    }
    .tab.active { background: #fff; color: var(--accent-dark); box-shadow: 0 1px 3px #00000018; }
    label { display: block; margin: 10px 0 5px; font-weight: 650; }
    select, input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      min-height: 35px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
      color: var(--ink);
    }
    input[type="checkbox"] { width: 16px; height: 16px; margin: 0; }
    input[type="color"] {
      width: 100%;
      height: 36px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .check-row { display: flex; gap: 8px; align-items: center; margin-top: 9px; }
    .check-row label { margin: 0; font-weight: 500; }
    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button.command {
      min-height: 37px;
      border: 1px solid var(--accent);
      border-radius: 5px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    button.command:hover { background: var(--accent-dark); }
    button.command.secondary { background: var(--blue); border-color: var(--blue); }
    button:disabled, select:disabled, input:disabled { opacity: .5; cursor: not-allowed; }
    .panel[hidden] { display: none; }
    .filter-list {
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 6px;
      background: #fafbfc;
    }
    .filter-item {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      padding: 4px;
    }
    .filter-item span:last-child { color: var(--muted); font-size: 12px; }
    .tree-actions, .element-actions {
      display: flex;
      gap: 6px;
      margin: 6px 0;
    }
    .mini-button {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: #334155;
      cursor: pointer;
      padding: 4px 8px;
    }
    .tree-node { margin: 2px 0; }
    .tree-node summary {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      cursor: pointer;
      list-style: none;
      font-weight: 650;
    }
    .tree-node summary::-webkit-details-marker { display: none; }
    .tree-node summary::before { content: "▸"; width: 12px; color: #6b7280; }
    .tree-node[open] > summary::before { content: "▾"; }
    .tree-children { margin-left: 19px; border-left: 1px solid #d9dee5; padding-left: 7px; }
    .tree-leaf {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      min-height: 27px;
      padding: 2px 3px;
    }
    .tree-count { color: var(--muted); font-size: 12px; }
    .element-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .element-list {
      height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fafbfc;
      padding: 5px;
    }
    .element-choice {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 27px;
    }
    .selected-element {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 26px 26px;
      gap: 3px;
      align-items: center;
      min-height: 29px;
      padding: 2px 3px;
      border-bottom: 1px solid #e5e9ee;
    }
    .move-button {
      width: 26px;
      min-height: 24px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .style-editor {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
    }
    .legend-editor-table {
      margin-top: 8px;
      max-height: 430px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fff;
    }
    .legend-editor-head,
    .legend-editor-row {
      display: grid;
      grid-template-columns: minmax(125px, 1fr) 44px 44px 78px 27px;
      gap: 5px;
      align-items: center;
      min-height: 37px;
      padding: 4px 5px;
      border-bottom: 1px solid #e4e8ed;
    }
    .legend-editor-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eef2f5;
      color: #4b5563;
      font-size: 12px;
      font-weight: 700;
    }
    .legend-editor-row:last-child { border-bottom: 0; }
    .legend-editor-row.level-mission .legend-name { padding-left: 13px; }
    .legend-editor-row.level-sub .legend-name { padding-left: 26px; }
    .legend-name {
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }
    .legend-editor-row input[type="color"] {
      height: 28px;
      min-height: 28px;
      padding: 1px;
    }
    .legend-editor-row select {
      min-height: 29px;
      padding: 3px;
      font-size: 12px;
    }
    .reset-row {
      width: 27px;
      min-height: 27px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .style-file-input {
      display: none;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      background: #edf7f5;
      color: #285e58;
      display: none;
    }
    .status.error { display: block; background: #fff0ef; color: var(--danger); }
    .chart-shell {
      min-height: calc(100vh - 36px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 12px;
      display: grid;
      grid-template-rows: minmax(560px, 1fr) auto;
      gap: 8px;
    }
    .chart-title {
      display: none;
    }
    #chart { width: 100%; height: 100%; min-height: 560px; background: #fff; }
    .chart-note { color: var(--muted); min-height: 20px; }
    .axis, .plot-frame { stroke: #000; stroke-width: 1.4; fill: none; }
    .tick { stroke: #000; stroke-width: 1.1; }
    .tick-label { fill: #252b32; font-size: 20px; font-family: Calibri, FangSong, "仿宋", sans-serif; }
    .axis-label { fill: #252b32; font-size: 32px; font-weight: 700; font-family: Calibri, FangSong, "仿宋", sans-serif; }
    .legend-text { fill: #252b32; font-size: 12px; font-family: Calibri, FangSong, "仿宋", sans-serif; }
    #tooltip {
      position: fixed;
      display: none;
      pointer-events: none;
      z-index: 10;
      max-width: 320px;
      padding: 8px 10px;
      border-radius: 5px;
      background: rgba(20, 25, 31, .94);
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { max-height: none; border-right: 0; border-bottom: 1px solid var(--line); }
      .chart-shell { min-height: 720px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>元素作图工作台</h1>
      <div class="muted">数据仅在当前浏览器中处理，不上传到服务器。</div>
      <label for="sidebarWidth">控制栏宽度</label>
      <input id="sidebarWidth" type="range" min="300" max="620" value="350">

      <details class="control-section" open>
      <summary>数据</summary>
      <label for="fileInput">Excel 或 CSV 文件</label>
      <input id="fileInput" type="file" accept=".xlsx,.xls,.xlsm,.csv">
      <label for="sheetSelect">工作表</label>
      <select id="sheetSelect" disabled></select>
      </details>

      <details class="control-section">
      <summary>计算列</summary>
      <label for="newName">新列名称</label>
      <input id="newName" type="text" placeholder="例如 Zr_Nb" disabled>
      <div class="row">
        <div><label for="numSelect">分子</label><select id="numSelect" disabled></select></div>
        <div><label for="denSelect">分母</label><select id="denSelect" disabled></select></div>
      </div>
      <button id="addRatio" class="command secondary" type="button" disabled>新增比值列</button>
      </details>

      <div class="tabs" role="tablist">
        <button id="scatterTab" class="tab active" type="button">散点图</button>
        <button id="lineTab" class="tab" type="button">元素配分图</button>
      </div>

      <section id="scatterControls" class="panel">
        <details class="control-section" open>
        <summary>坐标</summary>
        <div class="row">
          <div><label for="xSelect">横坐标</label><select id="xSelect" disabled></select></div>
          <div><label for="ySelect">纵坐标</label><select id="ySelect" disabled></select></div>
        </div>
        <div class="row">
          <div><label for="xTitle">横轴标题</label><input id="xTitle" type="text" disabled></div>
          <div><label for="yTitle">纵轴标题</label><input id="yTitle" type="text" disabled></div>
        </div>
        <div class="row">
          <div class="check-row"><input id="logX" type="checkbox" disabled><label for="logX">横轴对数</label></div>
          <div class="check-row"><input id="logY" type="checkbox" disabled><label for="logY">纵轴对数</label></div>
        </div>
        <label>横轴范围与刻度</label>
        <div class="row">
          <input id="xMin" type="number" step="any" placeholder="最小值" disabled>
          <input id="xMax" type="number" step="any" placeholder="最大值" disabled>
        </div>
        <input id="xStep" type="number" step="any" min="0" placeholder="主刻度间隔（自动）" disabled>
        <label>纵轴范围与刻度</label>
        <div class="row">
          <input id="yMin" type="number" step="any" placeholder="最小值" disabled>
          <input id="yMax" type="number" step="any" placeholder="最大值" disabled>
        </div>
        <input id="yStep" type="number" step="any" min="0" placeholder="主刻度间隔（自动）" disabled>
        </details>
      </section>

      <section id="lineControls" class="panel" hidden>
        <details class="control-section" open>
        <summary>元素序列与折线</summary>
        <div class="element-actions">
          <button id="reePreset" class="mini-button" type="button" disabled>稀土元素预设</button>
          <button id="normalizedPreset" class="mini-button" type="button" disabled>全部 _N</button>
          <button id="selectAllElements" class="mini-button" type="button" disabled>全选</button>
          <button id="clearElements" class="mini-button" type="button" disabled>清空</button>
        </div>
        <label for="seriesName">临时保存当前元素系列</label>
        <div class="row">
          <input id="seriesName" type="text" placeholder="例如 REE 精简组合" disabled>
          <button id="saveSeries" class="mini-button" type="button" disabled>保存</button>
        </div>
        <div class="row">
          <select id="savedSeries" disabled></select>
          <button id="deleteSeries" class="mini-button" type="button" disabled>删除</button>
        </div>
        <div class="element-picker">
          <div>
            <label>可选数值列</label>
            <div id="availableElements" class="element-list"></div>
          </div>
          <div>
            <label>已选元素及顺序</label>
            <div id="selectedElements" class="element-list"></div>
          </div>
        </div>
        <label for="lineMode">线条模式</label>
        <select id="lineMode" disabled>
          <option value="individual">每个样品一条线</option>
          <option value="mean">每个类别的平均值</option>
        </select>
        <label for="meanField">平均值分组字段</label>
        <select id="meanField" disabled></select>
        <div class="check-row"><input id="lineLogY" type="checkbox" checked disabled><label for="lineLogY">纵轴使用对数坐标</label></div>
        <div class="check-row"><input id="showMarkers" type="checkbox" checked disabled><label for="showMarkers">显示数据点</label></div>
        <div class="check-row"><input id="showSd" type="checkbox" checked disabled><label for="showSd">平均值显示 ±1 SD 阴影</label></div>
        <label>纵轴范围与刻度</label>
        <div class="row">
          <input id="lineYMin" type="number" step="any" placeholder="最小值" disabled>
          <input id="lineYMax" type="number" step="any" placeholder="最大值" disabled>
        </div>
        <input id="lineYStep" type="number" step="any" min="0" placeholder="主刻度间隔（自动）" disabled>
        </details>
      </section>

      <details class="control-section" open>
      <summary>分类与筛选</summary>
      <label for="colorMode">颜色规则</label>
      <select id="colorMode" disabled>
        <option value="hierarchy">Mission 色系 + Sub 色阶</option>
        <option value="mission">仅按 Mission</option>
        <option value="ti">仅按 Ti</option>
        <option value="type">按 Type</option>
      </select>
      <label for="shapeMode">点形状规则</label>
      <select id="shapeMode" disabled>
        <option value="ti">按 Ti</option>
        <option value="uniform">全部圆形</option>
      </select>
      <label>层级筛选：Ti → Mission → Sub</label>
      <div class="tree-actions">
        <button id="selectAllTree" class="mini-button" type="button" disabled>全选</button>
        <button id="clearTree" class="mini-button" type="button" disabled>清空</button>
        <button id="expandTree" class="mini-button" type="button" disabled>展开</button>
        <button id="collapseTree" class="mini-button" type="button" disabled>折叠</button>
      </div>
      <div id="filterList" class="filter-list"><div class="muted">请先导入文件</div></div>
      </details>

      <details class="control-section">
      <summary>图例与样式</summary>
      <div class="check-row"><input id="showLegend" type="checkbox" checked disabled><label for="showLegend">显示图例</label></div>
      <div class="row">
        <button id="resetLegendPosition" class="mini-button" type="button" disabled>重置图例位置</button>
        <label class="check-row"><input id="legendInteractive" type="checkbox" checked disabled>允许拖动缩放</label>
      </div>
      <div class="style-editor">
        <label for="legendEditorMode">图例样式表</label>
        <select id="legendEditorMode" disabled>
          <option value="type">第一类：Type</option>
          <option value="hierarchy">第二类：Ti → Mission → Sub</option>
        </select>
        <div id="legendEditorTable" class="legend-editor-table">
          <div class="muted" style="padding:8px">请先导入文件</div>
        </div>
        <div class="button-row">
          <button id="exportStyles" class="command" type="button" disabled>导出样式配置</button>
          <button id="importStyles" class="command secondary" type="button" disabled>导入样式配置</button>
        </div>
        <input id="styleFileInput" class="style-file-input" type="file" accept=".json">
      </div>
      </details>

      <details class="control-section" open>
      <summary>导出图片</summary>
      <div class="button-row">
        <button id="downloadPng" class="command" type="button" disabled>导出 PNG</button>
        <button id="downloadSvg" class="command secondary" type="button" disabled>导出 SVG</button>
      </div>
      <div id="status" class="status"></div>
      </details>
    </aside>

    <main>
      <div class="chart-shell">
        <div id="chartTitle" class="chart-title">请导入表格</div>
        <svg id="chart" viewBox="0 0 1200 900" role="img" aria-label="数据图表"></svg>
        <div id="chartNote" class="chart-note"></div>
      </div>
    </main>
  </div>
  <div id="tooltip"></div>

  <script>
    const NS = "http://www.w3.org/2000/svg";
    const categoryFieldAliases = {
      Type: ["Type"],
      Ti: ["Ti", "Ti_Type"],
      Mission: ["Mission"],
      Sub: ["Sub", "Sub_Type"]
    };
    const missionColors = {
      "Apollo 11": "#E87524", "Apollo11": "#E87524",
      "Apollo 17": "#E3B323", "A17": "#E3B323",
      "Apollo 12": "#3478B8", "A12": "#3478B8",
      "Apollo 15": "#3C9B5F", "A15": "#3C9B5F",
      "Apollo 14": "#718A9B", "A14": "#718A9B",
      "Apollo 16": "#A77A59", "A16": "#A77A59",
      "CE-5": "#24A8E0", "CE-6": "#7757B8",
      "Met": "#4B5563"
    };
    const tiColors = {
      "High-Ti": "#E65D32",
      "Low-Ti": "#258F87",
      "Very low-Ti": "#7655B5",
      "Very-Low-Ti": "#7655B5",
      "KREEP": "#D3A322"
    };
    const tiShapes = {
      "High-Ti": "circle",
      "Low-Ti": "square",
      "Very low-Ti": "diamond",
      "Very-Low-Ti": "diamond",
      "KREEP": "triangle"
    };
    const fallbackPalette = ["#4E79A7","#F28E2B","#59A14F","#E15759","#B07AA1","#76B7B2","#EDC948","#9C755F","#BAB0AC"];
    const defaultStyleOverrides = {
      "type:CE-5 Low-Ti":{"color":"#00e9fa","border":"#ff0000","shape":"square"},
      "type:CE-6 Low-Ti":{"color":"#64499b","border":"#ee00ff","shape":"square"},
      "type:CE-6 Very low-Ti":{"color":"#876bc1","border":"#fb00ff","shape":"diamond"},
      "type:Met Low-Ti":{"color":"#003585","border":"#ffffff","shape":"square"},
      "type:Met Very low-Ti":{"color":"#5700ad","border":"#ffffff","shape":"diamond"},
      "type:Apollo 11 High-Ti-K":{"color":"#eb863e","border":"#c8ff00","shape":"circle"},
      "type:Apollo 15 KREEP":{"color":"#328250","border":"#fbff00","shape":"triangle"},
      "leaf:KREEP\u0001Apollo 15\u0001Apollo 15 KREEP":{"color":"#2b7044","border":"#fff700","shape":"triangle"},
      "leaf:Low-Ti\u0001Apollo 14\u0001Apollo 14 KREEP":{"color":"#516370","border":"#fbff00","shape":"square"},
      "mission:Low-Ti\u0001CE-5":{"color":"#23e1de","border":"#ff0000","shape":"square"},
      "leaf:Low-Ti\u0001CE-5\u0001CE-5 Low-Ti":{"color":"#1a99a2","border":"#ff0000","shape":"square"},
      "mission:Low-Ti\u0001CE-6":{"color":"#2f58fe","border":"#ff00ea","shape":"square"},
      "leaf:Low-Ti\u0001CE-6\u0001CE-6 Low-Ti":{"color":"#24bdff","border":"#ff00dd","shape":"square"},
      "leaf:Low-Ti\u0001Met\u0001Met Low-Ti":{"color":"#0044a3","border":"#ffffff","shape":"square"},
      "ti:Very low-Ti":{"color":"#4600c7","border":"#ffffff","shape":"diamond"},
      "mission:Very low-Ti\u0001CE-6":{"color":"#7757b8","border":"#fb00ff","shape":"diamond"},
      "leaf:Very low-Ti\u0001CE-6\u0001CE-6 Very low-Ti":{"color":"#664b9e","border":"#ff00ea","shape":"diamond"},
      "mission:Very low-Ti\u0001Met":{"color":"#2d00a8","border":"#ffffff","shape":"diamond"},
      "leaf:Very low-Ti\u0001Met\u0001Met Very low-Ti":{"color":"#0006c2","border":"#ffffff","shape":"diamond"}
    };
    const state = {
      workbook: null, sheetName: "", headers: [], rows: [], mode: "scatter",
      numericHeaders: [], selectedElements: [], selectedLeafKeys: new Set(),
      tree: new Map(), subtypeIndex: new Map(), typeIndex: new Map(),
      styleOverrides: new Map(Object.entries(defaultStyleOverrides)),
      savedSeries: new Map(), legend: { x: 930, y: 102, scale: 1 }
    };
    const $ = id => document.getElementById(id);
    const svg = $("chart");

    function showStatus(text, error = false) {
      const el = $("status");
      el.textContent = text;
      el.className = "status" + (error ? " error" : "");
      el.style.display = text ? "block" : "none";
    }
    function svgEl(name, attrs = {}, text = "") {
      const el = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
      if (text !== "") el.textContent = text;
      return el;
    }
    function clean(value) { return value == null ? "" : String(value).trim(); }
    function number(value) {
      if (typeof value === "number" && Number.isFinite(value)) return value;
      if (typeof value !== "string") return NaN;
      const n = Number(value.replace(/,/g, "").trim());
      return Number.isFinite(n) ? n : NaN;
    }

    function marker(parent, x, y, style, size = 8, title = "") {
      let el;
      if (style.shape === "square") el = svgEl("rect",{x:x-size,y:y-size,width:size*2,height:size*2,rx:1});
      else if (style.shape === "diamond") el = svgEl("polygon",{points:`${x},${y-size*1.25} ${x+size*1.25},${y} ${x},${y+size*1.25} ${x-size*1.25},${y}`});
      else if (style.shape === "triangle") el = svgEl("polygon",{points:`${x},${y-size*1.35} ${x+size*1.2},${y+size} ${x-size*1.2},${y+size}`});
      else el = svgEl("circle",{cx:x,cy:y,r:size});
      el.setAttribute("fill",style.color);
      el.setAttribute("stroke",style.border || "#FFFFFF");
      el.setAttribute("stroke-width","1.2");
      if (title) attachTooltip(el,title);
      parent.append(el); return el;
    }
    function attachTooltip(el, html) {
      el.addEventListener("mousemove", e => {
        $("tooltip").innerHTML = html;
        $("tooltip").style.display = "block";
        $("tooltip").style.left = Math.min(window.innerWidth-330,e.clientX+14)+"px";
        $("tooltip").style.top = (e.clientY+14)+"px";
      });
      el.addEventListener("mouseleave", () => $("tooltip").style.display = "none");
    }
    function clearChart() { svg.replaceChildren(); }
    function drawSvgTitle(text) {
      svg.append(svgEl("text", {
        x: 600, y: 42, "text-anchor": "middle",
        fill: "#20262e", "font-size": "26", "font-weight": "800",
        "font-family": "Calibri, FangSong, 仿宋, sans-serif"
      }, text));
    }
    function drawAxes({xDomain,yDomain,xTitle,yTitle,logX=false,logY=false,categories=null,xStep=null,yStep=null}) {
      const box = { left: 128, right: 900, top: 86, bottom: categories ? 720 : 760 };
      svg.append(svgEl("rect",{x:box.left,y:box.top,width:box.right-box.left,height:box.bottom-box.top,class:"plot-frame"}));
      const sx = categories
        ? (v => box.left + (v/(Math.max(1,categories.length-1)))*(box.right-box.left))
        : scale(xDomain,[box.left,box.right]);
      const sy = scale(yDomain,[box.bottom,box.top]);
      const xTicks = categories ? categories.map((label,i)=>({p:i,label})) : ticks(xDomain,logX,6,xStep);
      xTicks.forEach(t => {
        const x=sx(t.p);
        svg.append(svgEl("line",{x1:x,x2:x,y1:box.bottom,y2:box.bottom-9,class:"tick"}));
        if (categories) {
          svg.append(svgEl("text",{
            x:x-3,y:box.bottom+25,"text-anchor":"end",class:"tick-label",
            transform:`rotate(-38 ${x-3} ${box.bottom+25})`
          },t.label));
        } else {
          svg.append(svgEl("text",{x,y:box.bottom+34,"text-anchor":"middle",class:"tick-label"},t.label));
        }
      });
      ticks(yDomain,logY,6,yStep).forEach(t => {
        const y=sy(t.p);
        svg.append(svgEl("line",{x1:box.left,x2:box.left+9,y1:y,y2:y,class:"tick"}));
        svg.append(svgEl("text",{x:box.left-16,y:y+7,"text-anchor":"end",class:"tick-label"},t.label));
      });
      svg.append(svgEl("text",{x:(box.left+box.right)/2,y:categories?850:838,"text-anchor":"middle",class:"axis-label"},xTitle));
      svg.append(svgEl("text",{x:48,y:(box.top+box.bottom)/2,"text-anchor":"middle",class:"axis-label",transform:`rotate(-90 48 ${(box.top+box.bottom)/2})`},yTitle));
      return {box,sx,sy};
    }
    function drawLegend(entries) {
      if (!$("showLegend").checked || !entries.length) return;
      const unique = [...new Map(entries.map(e=>[e.name,e])).values()];
      const startX=0, startY=0, rowH=31, rowsPerColumn=25, colWidth=135;
      const columns=Math.max(1,Math.ceil(Math.min(unique.length,50)/rowsPerColumn));
      const rows=Math.min(rowsPerColumn,unique.length);
      const width=columns*colWidth+12, height=Math.max(35,rows*rowH+10);
      const group=svgEl("g",{
        id:"legendGroup",
        transform:`translate(${state.legend.x} ${state.legend.y}) scale(${state.legend.scale})`
      });
      const background=svgEl("rect",{
        x:-8,y:-14,width,height,fill:"#ffffff","fill-opacity":"0.001",
        stroke:"transparent","data-legend-drag":"true",cursor:"move","pointer-events":"all"
      });
      group.append(background);
      unique.slice(0,50).forEach((e,i) => {
        const column=Math.floor(i/rowsPerColumn), row=i%rowsPerColumn;
        const x=startX+column*colWidth, y=startY+row*rowH;
        marker(group,x+5,y,e.style,4.5);
        const parts=e.name.split(" / ");
        const lines=parts.length>2 ? [`${parts[0]} / ${parts[1]}`,parts.slice(2).join(" / ")] : [e.name];
        lines.forEach((line,lineIndex)=>group.append(svgEl("text",{x:x+16,y:y+lineIndex*13+4,class:"legend-text"},line)));
      });
      if (unique.length>50) group.append(svgEl("text",{x:startX,y:height-4,class:"legend-text"},`另有 ${unique.length-50} 类未展开`));
      if ($("legendInteractive").checked) {
        group.append(svgEl("rect",{
          x:width-12,y:height-12,width:11,height:11,fill:"#176b63",
          stroke:"#ffffff","stroke-width":"1","data-legend-resize":"true",cursor:"nwse-resize"
        }));
      }
      svg.append(group);
      enableLegendInteraction(group);
    }
    function svgPoint(event) {
      const point=svg.createSVGPoint();
      point.x=event.clientX; point.y=event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }
    function enableLegendInteraction(group) {
      if (!$("legendInteractive").checked) return;
      const dragTarget=group.querySelector("[data-legend-drag]");
      const resizeTarget=group.querySelector("[data-legend-resize]");
      let action=null,start=null,origin=null;
      const begin=(event,type)=>{
        event.preventDefault();
        action=type;start=svgPoint(event);
        origin={...state.legend};
        svg.setPointerCapture(event.pointerId);
      };
      group.addEventListener("pointerdown",event=>{
        begin(event,event.target?.hasAttribute("data-legend-resize")?"resize":"drag");
      });
      svg.onpointermove=event=>{
        if(!action)return;
        const current=svgPoint(event);
        if(action==="drag"){
          state.legend.x=origin.x+(current.x-start.x);
          state.legend.y=origin.y+(current.y-start.y);
        }else{
          const delta=(current.x-start.x)/160;
          state.legend.scale=Math.min(2.2,Math.max(.55,origin.scale+delta));
        }
        group.setAttribute("transform",`translate(${state.legend.x} ${state.legend.y}) scale(${state.legend.scale})`);
      };
      svg.onpointerup=()=>{action=null;};
    }
    function renderScatter() {
      const xName=$("xSelect").value, yName=$("ySelect").value;
      const xTitle=$("xTitle").value.trim()||xName, yTitle=$("yTitle").value.trim()||yName;
      const logX=$("logX").checked, logY=$("logY").checked;
      const points=filteredRows().map(row=>({row,x:number(row[xName]),y:number(row[yName])}))
        .filter(p=>Number.isFinite(p.x)&&Number.isFinite(p.y)&&(!logX||p.x>0)&&(!logY||p.y>0));
      const title=`${xTitle} vs ${yTitle}`;
      $("chartTitle").textContent=title;
      clearChart();
      drawSvgTitle(title);
      if (!points.length) { $("chartNote").textContent="当前设置下没有可绘制的数据。"; return; }
      const autoXd=extent(points.map(p=>p.x),logX), autoYd=extent(points.map(p=>p.y),logY);
      const xd=manualDomain(autoXd,"xMin","xMax",logX);
      const yd=manualDomain(autoYd,"yMin","yMax",logY);
      const axes=drawAxes({
        xDomain:xd,yDomain:yd,xTitle,yTitle,logX,logY,
        xStep:logX?null:inputNumber("xStep"),yStep:logY?null:inputNumber("yStep")
      });
      const entries=[];
      points.forEach(p=>{
        const style=styleFor(p.row), x=axes.sx(logX?Math.log10(p.x):p.x), y=axes.sy(logY?Math.log10(p.y):p.y);
        const id=clean(p.row.Parent_Sample_ID)||clean(p.row.Record_ID)||"样品";
        marker(svg,x,y,style,8,`<b>${id}</b><br>${xName}: ${formatNumber(p.x)}<br>${yName}: ${formatNumber(p.y)}<br>${legendName(p.row)}`);
        entries.push({name:legendName(p.row),style});
      });
      drawLegend(entries);
      $("chartNote").textContent=`已绘制 ${points.length} 个数据点。`;
    }
    function selectedSequence() { return [...state.selectedElements]; }
    function renderLine() {
      const columns=selectedSequence(), rows=filteredRows();
      clearChart();
      if (columns.length<2) { $("chartTitle").textContent="元素配分图"; $("chartNote").textContent="请至少选择两个元素。"; return; }
      const logY=$("lineLogY").checked;
      let series=[];
      if ($("lineMode").value==="mean") {
        const field=$("meanField").value, groups=new Map();
        rows.forEach(row=>{const k=clean(row[field])||"未分类"; if(!groups.has(k))groups.set(k,[]);groups.get(k).push(row);});
        groups.forEach((group,name)=>{
          const stats=columns.map(c=>{
            const nums=group.map(r=>number(r[c])).filter(Number.isFinite);
            if(!nums.length)return {mean:NaN,sd:NaN};
            const mean=nums.reduce((a,b)=>a+b,0)/nums.length;
            const variance=nums.length>1?nums.reduce((sum,v)=>sum+(v-mean)**2,0)/(nums.length-1):0;
            return {mean,sd:Math.sqrt(variance)};
          });
          series.push({name,values:stats.map(s=>s.mean),sd:stats.map(s=>s.sd),row:group[0]});
        });
      } else {
        series=rows.map(row=>({name:clean(row.Parent_Sample_ID)||clean(row.Record_ID)||"样品",values:columns.map(c=>number(row[c])),row}));
      }
      const all=series.flatMap(s=>{
        const values=[...s.values];
        if($("lineMode").value==="mean"&&$("showSd").checked&&s.sd){
          s.values.forEach((mean,i)=>{
            if(Number.isFinite(mean)&&Number.isFinite(s.sd[i])){
              values.push(mean+s.sd[i],mean-s.sd[i]);
            }
          });
        }
        return values;
      }).filter(v=>Number.isFinite(v)&&(!logY||v>0));
      const autoYd=extent(all,logY);
      const yd=manualDomain(autoYd,"lineYMin","lineYMax",logY);
      const title=`${columns[0]} vs ${columns[columns.length-1]}`;
      $("chartTitle").textContent=title;
      drawSvgTitle(title);
      if (!yd) { $("chartNote").textContent="当前设置下没有可绘制的数据。"; return; }
      const axes=drawAxes({
        xDomain:[0,columns.length-1],yDomain:yd,xTitle:"Element",yTitle:"Normalized value",
        logY,categories:columns,yStep:logY?null:inputNumber("lineYStep")
      });
      const entries=[];
      series.forEach(s=>{
        const style=styleFor(s.row), pts=[];
        s.values.forEach((v,i)=>{if(Number.isFinite(v)&&(!logY||v>0))pts.push({x:axes.sx(i),y:axes.sy(logY?Math.log10(v):v),v,i});});
        if($("lineMode").value==="mean"&&$("showSd").checked&&s.sd){
          const upper=[],lower=[];
          s.values.forEach((mean,i)=>{
            const sd=s.sd[i];
            if(!Number.isFinite(mean)||!Number.isFinite(sd))return;
            const high=mean+sd,low=mean-sd;
            if(logY&&low<=0)return;
            upper.push(`${axes.sx(i)},${axes.sy(logY?Math.log10(high):high)}`);
            lower.unshift(`${axes.sx(i)},${axes.sy(logY?Math.log10(low):low)}`);
          });
          if(upper.length>1)svg.append(svgEl("polygon",{
            points:[...upper,...lower].join(" "),fill:style.color,"fill-opacity":"0.16",stroke:"none"
          }));
        }
        if(pts.length>1) svg.append(svgEl("polyline",{points:pts.map(p=>`${p.x},${p.y}`).join(" "),fill:"none",stroke:style.color,"stroke-width":$("lineMode").value==="mean"?3:1.5,"stroke-opacity":$("lineMode").value==="mean"?1:.68}));
        if($("showMarkers").checked) pts.forEach(p=>marker(svg,p.x,p.y,style,$("lineMode").value==="mean"?6:4,`<b>${s.name}</b><br>${columns[p.i]}: ${formatNumber(p.v)}<br>${legendName(s.row)}`));
        entries.push({name:$("lineMode").value==="mean"?s.name:legendName(s.row),style});
      });
      drawLegend(entries);
      $("chartNote").textContent=`已绘制 ${series.length} 条线，元素序列共 ${columns.length} 列。`;
    }
    function render() {
      if (!state.rows.length) return;
      try { state.mode==="scatter"?renderScatter():renderLine(); }
      catch(err) { showStatus(err.message||String(err),true); }
    }
    function addRatio() {
      const name=$("newName").value.trim(), num=$("numSelect").value, den=$("denSelect").value;
      if(!name) return showStatus("请输入新列名称。",true);
      if(state.headers.includes(name)) return showStatus("该列名已经存在。",true);
      state.rows.forEach(row=>{const a=number(row[num]),b=number(row[den]);row[name]=Number.isFinite(a)&&Number.isFinite(b)&&b!==0?a/b:null;});
      state.headers.push(name);
      populateControls();
      $("xSelect").value=name; $("xTitle").value=name;
      showStatus(`已新增计算列 ${name} = ${num} / ${den}。`);
      render();
    }
    function serializedSvg() {
      const clone=svg.cloneNode(true);
      clone.setAttribute("xmlns",NS); clone.setAttribute("width","1200"); clone.setAttribute("height","900");
      const style=svgEl("style",{},`.plot-frame{stroke:#000;stroke-width:1.4;fill:none}.tick{stroke:#000;stroke-width:1.1}.tick-label{fill:#252b32;font-size:20px;font-family:Calibri,FangSong,sans-serif}.axis-label{fill:#252b32;font-size:32px;font-weight:700;font-family:Calibri,FangSong,sans-serif}.legend-text{fill:#252b32;font-size:12px;font-family:Calibri,FangSong,sans-serif}`);
      clone.prepend(style);
      return new XMLSerializer().serializeToString(clone);
    }
    function downloadBlob(blob, filename) {
      const a=document.createElement("a"), url=URL.createObjectURL(blob);
      a.href=url;a.download=safeName(filename);document.body.append(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
    }
    function exportName(ext) { return `${safeName($("chartTitle").textContent)}.${ext}`; }
    function downloadSvg() { downloadBlob(new Blob([serializedSvg()],{type:"image/svg+xml;charset=utf-8"}),exportName("svg")); }
    function downloadPng() {
      const image=new Image(), blob=new Blob([serializedSvg()],{type:"image/svg+xml;charset=utf-8"}), url=URL.createObjectURL(blob);
      image.onload=()=>{
        const canvas=document.createElement("canvas");canvas.width=2400;canvas.height=1800;
        const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(image,0,0,canvas.width,canvas.height);
        URL.revokeObjectURL(url);canvas.toBlob(png=>downloadBlob(png,exportName("png")),"image/png");
      };
      image.onerror=()=>{URL.revokeObjectURL(url);showStatus("PNG 导出失败，请尝试 SVG。",true);};
      image.src=url;
    }

    $("fileInput").addEventListener("change", async e=>{
      const file=e.target.files[0]; if(!file)return;
      try {
        showStatus("正在读取文件...");
        state.workbook=XLSX.read(await file.arrayBuffer(),{type:"array"});
        setOptions($("sheetSelect"),state.workbook.SheetNames);
        $("sheetSelect").disabled=false;
        parseSheet(state.workbook.SheetNames[0]);
      } catch(err) { showStatus(`读取失败：${err.message||err}`,true); }
    });
    $("sheetSelect").addEventListener("change",e=>parseSheet(e.target.value));
    $("sidebarWidth").addEventListener("input",e=>{
      document.documentElement.style.setProperty("--sidebar-width",`${e.target.value}px`);
    });
    $("scatterTab").addEventListener("click",()=>switchMode("scatter"));
    $("lineTab").addEventListener("click",()=>switchMode("line"));
    $("lineMode").addEventListener("change",()=>{updateLineModeState();render();});
    $("saveSeries").addEventListener("click",saveCurrentSeries);
    $("savedSeries").addEventListener("change",e=>restoreSavedSeries(e.target.value));
    $("deleteSeries").addEventListener("click",deleteSavedSeries);
    $("resetLegendPosition").addEventListener("click",()=>{
      state.legend={x:930,y:102,scale:1};
      render();
    });
    $("legendInteractive").addEventListener("change",render);
    $("legendEditorMode").addEventListener("change",renderLegendEditor);
    $("exportStyles").addEventListener("click",exportStyleConfig);
    $("importStyles").addEventListener("click",()=>$("styleFileInput").click());
    $("styleFileInput").addEventListener("change",e=>{
      const file=e.target.files[0];
      if(file) importStyleConfig(file);
      e.target.value="";
    });
    $("reePreset").addEventListener("click",()=>{
      state.selectedElements=reeColumns(state.numericHeaders);
      renderElementPicker();render();
    });
    $("normalizedPreset").addEventListener("click",()=>{
      state.selectedElements=state.numericHeaders.filter(name=>/_N$/i.test(name));
      renderElementPicker();render();
    });
    $("selectAllElements").addEventListener("click",()=>{
      state.selectedElements=[...state.numericHeaders];
      renderElementPicker();render();
    });
    $("clearElements").addEventListener("click",()=>{
      state.selectedElements=[];
      renderElementPicker();render();
    });
    $("selectAllTree").addEventListener("click",()=>{
      state.selectedLeafKeys=new Set(state.rows.map(leafKey));
      renderClassificationTree();render();
    });
    $("clearTree").addEventListener("click",()=>{
      state.selectedLeafKeys.clear();
      renderClassificationTree();render();
    });
    $("expandTree").addEventListener("click",()=>{
      $("filterList").querySelectorAll("details").forEach(el=>el.open=true);
    });
    $("collapseTree").addEventListener("click",()=>{
      $("filterList").querySelectorAll("details").forEach(el=>el.open=false);
    });
    $("addRatio").addEventListener("click",addRatio);
    $("downloadSvg").addEventListener("click",downloadSvg);
    $("downloadPng").addEventListener("click",downloadPng);
    ["xSelect","ySelect"].forEach(id=>$(id).addEventListener("change",()=>{
      if(id==="xSelect")$("xTitle").value=$(id).value;else $("yTitle").value=$(id).value;render();
    }));
    ["xTitle","yTitle"].forEach(id=>$(id).addEventListener("input",render));
    ["logX","logY","lineLogY","showMarkers","showLegend","showSd"].forEach(id=>$(id).addEventListener("change",render));
    ["xMin","xMax","xStep","yMin","yMax","yStep","lineYMin","lineYMax","lineYStep"].forEach(id=>$(id).addEventListener("input",render));
    ["meanField","colorMode","shapeMode"].forEach(id=>$(id).addEventListener("change",render));
    try {
      const saved=JSON.parse(sessionStorage.getItem("elementPlotSavedSeries")||"{}");
      state.savedSeries=new Map(Object.entries(saved).filter(([,columns])=>Array.isArray(columns)));
    } catch {}
    setEnabled(false);
    renderSavedSeries();
    if (new URLSearchParams(location.search).get("demo") === "1") {
      fetch("demo.csv?v=2").then(r => r.arrayBuffer()).then(buffer => {
        state.workbook = XLSX.read(buffer, { type: "array" });
        setOptions($("sheetSelect"), state.workbook.SheetNames);
        parseSheet(state.workbook.SheetNames[0]);
      }).catch(err => showStatus(`测试数据读取失败：${err.message || err}`, true));
    }
  </script>
</body>
